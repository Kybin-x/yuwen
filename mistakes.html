<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>错题本 | 语文学习乐园</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="logo">语文学习乐园</div>
    <nav class="main-nav">
      <a href="index.html">首页</a>
      <a href="knowledge.html">知识卡片</a>
      <a href="practice.html">练习区</a>
      <a href="games.html">游戏区</a>
      <a href="mistakes.html" class="active">错题本</a>
      <a href="progress.html">进度成就</a>
    </nav>
  </header>

  <main class="container">
    <section class="page-title">
      <h1>错题本</h1>
      <p>按模块筛选错题，集中复习更高效。</p>
    </section>

    <section class="card" style="margin-bottom: 16px;">
      <button class="btn" data-filter="all">全部</button>
      <button class="btn" data-filter="pinyin-zixing">字音字形</button>
      <button class="btn" data-filter="jushi-bingju">句式与病句</button>
      <button class="btn" data-filter="yw-wen">应用文写作</button>
    </section>

    <section class="card" id="mistake-list">
      <p>正在加载错题...</p>
    </section>

    <div class="center">
      <button class="btn danger" id="clear-mistakes">清空错题</button>
    </div>
  </main>

  <footer class="site-footer">
    <span>语文学习乐园 · 错题本</span>
  </footer>

  <script>
    (function () {
      const listEl = document.getElementById("mistake-list");
      const clearBtn = document.getElementById("clear-mistakes");
      const filterBtns = document.querySelectorAll("[data-filter]");
      let activeFilter = "all";

      function getMistakes() {
        return JSON.parse(localStorage.getItem("yc_mistakes") || "[]");
      }

      function render() {
        const all = getMistakes();
        const filtered = activeFilter === "all"
          ? all
          : all.filter(m => m.type === activeFilter);

        if (!filtered.length) {
          listEl.innerHTML = "<p>暂无错题，继续加油！</p>";
          return;
        }

        listEl.innerHTML = filtered.map(m => (
          `<div class="card">
            <h3>[${m.type}] ${m.q}</h3>
            <p>✅ 正确答案：${m.ans}</p>
            <p>💡 解析：${m.exp}</p>
          </div>`
        )).join("");
      }

      filterBtns.forEach(btn => {
        btn.addEventListener("click", () => {
          activeFilter = btn.dataset.filter;
          render();
        });
      });

      clearBtn.addEventListener("click", () => {
        localStorage.removeItem("yc_mistakes");
        render();
      });

      render();
    })();
  </script>
</body>
</html>
