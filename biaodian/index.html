<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>标点符号小课堂 · 活泼橙卡版</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar">
    <div class="nav-container">
      <h1 class="logo">✨ 标点魔法屋</h1>
      <ul class="nav-links">
        <li><a href="index.html" class="active">首页</a></li>
        <li><a href="game.html">闯关游戏</a></li>
        <li><a href="#explanations">解析大全</a></li>
      </ul>
    </div>
  </nav>

  <!-- 主体 -->
  <main class="main-content">
    <section class="hero">
      <h2>🎯 标点符号正确使用指南</h2>
      <p>23道经典单选题 | 卡片式学习 | 橙色活力设计</p>
    </section>

    <!-- 知识点分类卡片区 -->
    <section class="knowledge-grid" id="knowledge-grid">
      <!-- 动态插入由 JS 生成 -->
    </section>

    <!-- 题目解析锚点 -->
    <section id="explanations" class="explanations-section">
      <h2>📖 详细解析汇总</h2>
      <div class="explanation-list" id="explanation-list">
        <!-- 将由 JS 填充 -->
      </div>
    </section>
  </main>

  <!-- 脚本 -->
  <script src="questions.js"></script>
  <script>
    // 初始化页面
    document.addEventListener('DOMContentLoaded', () => {
      const grid = document.getElementById('knowledge-grid');
      const expList = document.getElementById('explanation-list');

      // 渲染知识点卡片
      window.KNOWLEDGE_TAGS.forEach(tag => {
        const card = document.createElement('div');
        card.className = 'knowledge-card';
        card.innerHTML = `
          <div class="card-header" style="background: linear-gradient(135deg, #FF6B35, #FF9E44);">
            <span class="tag-icon">${tag.icon}</span>
            <h3>${tag.name}</h3>
            <span class="badge">${QUESTIONS.filter(q => q.tags.includes(tag.id)).length}</span>
          </div>
          <div class="card-body collapsed">
            <p>点击展开本类题目 →</p>
            <ul class="question-list"></ul>
          </div>
        `;
        grid.appendChild(card);

        // 绑定点击展开
        const body = card.querySelector('.card-body');
        const list = card.querySelector('.question-list');
        const questions = QUESTIONS.filter(q => q.tags.includes(tag.id));

        if (questions.length > 0) {
          questions.forEach(q => {
            const li = document.createElement('li');
            li.innerHTML = `<a href="#" onclick="showQuestion(${q.id}); return false;">Q${q.id}：${q.stem.substring(0, 30)}…</a>`;
            list.appendChild(li);
          });

          card.querySelector('.card-header').addEventListener('click', () => {
            body.classList.toggle('collapsed');
          });
        }
      });

      // 渲染解析列表（全部题目）
      QUESTIONS.forEach(q => {
        const item = document.createElement('div');
        item.className = 'explanation-item';
        item.innerHTML = `
          <h4>Q${q.id}．${q.stem}</h4>
          <div class="options">
            <p><strong>A.</strong> ${q.options.A}</p>
            <p><strong>B.</strong> ${q.options.B}</p>
            <p><strong>C.</strong> ${q.options.C}</p>
            <p><strong>D.</strong> ${q.options.D}</p>
          </div>
          <div class="answer-box">
            <strong>答案：</strong><span class="ans">${q.answer}</span>
            <button class="btn-show" onclick="toggleAnalysis(${q.id})">查看解析</button>
          </div>
          <div class="analysis hidden" id="ana-${q.id}">
            <p><strong>解析：</strong>${q.analysis}</p>
          </div>
        `;
        expList.appendChild(item);
      });
    });

    // 展示单题模态窗（简化版：直接滚动到该题）
    function showQuestion(id) {
      const el = document.getElementById(`ana-${id}`);
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        toggleAnalysis(id);
      }
    }

    function toggleAnalysis(id) {
      const ana = document.getElementById(`ana-${id}`);
      const btn = ana.parentElement.querySelector('.btn-show');
      ana.classList.toggle('hidden');
      btn.textContent = ana.classList.contains('hidden') ? '查看解析' : '收起';
    }
  </script>
</body>
</html>
