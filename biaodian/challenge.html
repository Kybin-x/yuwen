<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知识闯关挑战</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container challenge-container">
    <!-- 信息登记页 -->
    <div class="register-page" id="registerPage">
      <div class="register-card">
        <h2>🎯 闯关挑战</h2>
        <p class="subtitle">请先填写您的信息</p>
        <form id="registerForm">
          <div class="form-group">
            <label>班级</label>
            <input type="text" id="className" placeholder="例：高一(3)班" required>
          </div>
          <div class="form-group">
            <label>学号（9位）</label>
            <input type="text" id="studentId" placeholder="例：202301001" maxlength="9" pattern="\d{9}" required>
            <span class="error-msg" id="idError"></span>
          </div>
          <div class="form-group">
            <label>姓名</label>
            <input type="text" id="studentName" placeholder="请输入您的姓名" required>
          </div>
          <button type="submit" class="btn-start">开始挑战 →</button>
        </form>
      </div>
    </div>

    <!-- 闯关进行中页面 -->
    <div class="challenge-page hidden" id="challengePage">
      <!-- 顶部进度条 -->
      <div class="progress-bar">
        <div class="progress-info">
          <span class="user-badge" id="userBadge">张三的挑战</span>
          <span class="progress-text" id="progressText">0/24</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <!-- 题目区 -->
      <div class="quiz-container">
        <div class="quiz-header">
          <span class="quiz-number" id="quizNumber">第1题</span>
          <span class="quiz-point" id="quizPoint">问号</span>
        </div>
        <div class="quiz-question" id="quizQuestion">
          <!-- 动态加载题干 -->
        </div>
        <div class="quiz-options" id="quizOptions">
          <!-- 动态加载选项 -->
        </div>
        <div class="quiz-feedback hidden" id="quizFeedback">
          <!-- 答题反馈 -->
        </div>
        <div class="quiz-actions">
          <button class="btn-submit" id="btnSubmit">提交答案</button>
          <button class="btn-next hidden" id="btnNext">下一题 →</button>
        </div>
      </div>
    </div>

    <!-- 终局页面 -->
    <div class="result-page hidden" id="resultPage">
      <div class="result-card">
        <h2 class="result-title">🏆 挑战结束！</h2>
        <div class="result-score" id="resultScore">85</div>
        <div class="result-badge" id="resultBadge">【规范达人】</div>
        <p class="result-message" id="resultMessage">
          <!-- 个性化激励语 -->
        </p>
        <div class="result-actions">
          <button class="btn-review" id="btnReview">💡 错题练习</button>
          <button class="btn-restart" id="btnRestart">🔄 重新闯关</button>
          <button class="btn-home" onclick="location.href='index.html'">← 返回首页</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/quizBank.js"></script>
  <script src="js/challenge.js"></script>
</body>
</html>
