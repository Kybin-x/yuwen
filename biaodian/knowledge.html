<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知识点详情</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <!-- 面包屑导航 -->
    <nav class="breadcrumb">
      <a href="index.html">首页</a> &gt; <span id="currentPoint">问号</span>
    </nav>

    <!-- 知识点介绍卡片 -->
    <section class="knowledge-card" id="knowledgeCard">
      <div class="knowledge-icon" id="knowledgeIcon">❓</div>
      <h2 class="knowledge-title" id="knowledgeTitle">问号使用规范</h2>
      <div class="knowledge-content" id="knowledgeContent">
        <!-- 动态加载知识点内容 -->
      </div>
    </section>

    <!-- 关联题目区 -->
    <section class="quiz-section">
      <h3 class="section-title">📝 相关练习题</h3>
      <div class="quiz-list" id="quizList">
        <!-- 动态生成题目 -->
      </div>
    </section>

    <!-- 返回按钮 -->
    <div class="action-bar">
      <button class="btn-back" onclick="location.href='index.html'">← 返回首页</button>
    </div>
  </div>

  <script src="js/quizBank.js"></script>
  <script src="js/knowledge.js"></script>
</body>
</html>
