<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>游戏区 | 语文学习乐园</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="logo">语文学习乐园</div>
    <nav class="main-nav">
      <a href="index.html">首页</a>
      <a href="knowledge.html">知识卡片</a>
      <a href="practice.html">练习区</a>
      <a href="games.html" class="active">游戏区</a>
      <a href="mistakes.html">错题本</a>
      <a href="progress.html">进度成就</a>
    </nav>
  </header>

  <main class="container">
    <section class="page-title">
      <h1>游戏区</h1>
      <p>三大模块闯关游戏，边玩边巩固。</p>
    </section>

    <section class="grid">
      <article class="card">
        <h2>字音字形闯关</h2>
        <p>题量：20题</p>
        <button class="btn primary" data-game="pinyin">开始</button>
      </article>
      <article class="card">
        <h2>句式病句挑战</h2>
        <p>题量：15题</p>
        <button class="btn primary" data-game="bingju">开始</button>
      </article>
      <article class="card">
        <h2>应用文写作挑战</h2>
        <p>题量：17题</p>
        <button class="btn primary" data-game="yw">开始</button>
      </article>
    </section>

    <section class="card" style="margin-top: 20px;">
      <h2>模块统计</h2>
      <ul class="list">
        <li>字音字形已完成：<span id="stat-pz">0</span> / 20</li>
        <li>句式与病句已完成：<span id="stat-jb">0</span> / 15</li>
        <li>应用文写作已完成：<span id="stat-yw">0</span> / 17</li>
      </ul>
    </section>

    <section class="game-panel" id="game-panel">
      <div class="quiz-card">
        <div class="quiz-meta">
          <span id="game-title">游戏加载中...</span>
          <span id="game-progress">1 / 5</span>
        </div>
        <h2 id="game-question">题目加载中...</h2>
        <div class="options" id="game-options"></div>
        <div class="quiz-actions">
          <button class="btn primary" id="game-submit">提交答案</button>
          <button class="btn" id="game-next">下一题</button>
        </div>
        <div class="quiz-feedback" id="game-feedback"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <span>语文学习乐园 · 游戏区</span>
  </footer>

  <script type="module" src="assets/app.js"></script>
  <script>
    (function () {
      const stats = JSON.parse(localStorage.getItem("yc_stats") || '{"modules":{"pinyin-zixing":0,"jushi-bingju":0,"yw-wen":0}}');
      document.getElementById("stat-pz").textContent = stats.modules["pinyin-zixing"] || 0;
      document.getElementById("stat-jb").textContent = stats.modules["jushi-bingju"] || 0;
      document.getElementById("stat-yw").textContent = stats.modules["yw-wen"] || 0;
    })();
  </script>
</body>
</html>
